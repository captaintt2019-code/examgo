<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamGo – 智能練習題生成器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }
    html, body, #root { height: 100%; }
    @media print {
      body > *:not(#examgo-print) { display: none !important; }
      #examgo-print {
        display: block !important;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 12pt;
        line-height: 1.6;
        color: #000;
        padding: 0;
        margin: 0;
      }
      .no-print { display: none !important; }
      .dotted-box { border: 1px dotted #aaa; min-height: 48px; margin: 6px 0 16px; }
      @page { margin: 2cm; size: A4; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useCallback, useEffect } = React;

    // ── Icons ─────────────────────────────────────────────────────────────────
    const Icons = {
      Upload:      ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>,
      Printer:     ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
      RefreshCw:   ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
      Loader2:     ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>,
      AlertCircle: ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      BookOpen:    ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      ChevronDown: ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      Key:         ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
      FileImage:   ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><circle cx="10" cy="13" r="2"/><path d="m20 17-1.09-1.09a2 2 0 0 0-2.82 0L10 22"/></svg>,
      Zap:         ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      Lock:        ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
    };

    // ── Subject Colors & Detection ───────────────────────────────────────────
    const SUBJECT_COLORS = {
      Mathematics: 'bg-blue-100 text-blue-800',
      English:     'bg-green-100 text-green-800',
      Chinese:     'bg-red-100 text-red-800',
      Science:     'bg-purple-100 text-purple-800',
      History:     'bg-yellow-100 text-yellow-800',
      Geography:   'bg-teal-100 text-teal-800',
      default:     'bg-gray-100 text-gray-700',
    };
    function subjectColor(s) { return SUBJECT_COLORS[s] || SUBJECT_COLORS.default; }
    function detectSubject(text) {
      const t = text.toLowerCase();
      if (/math|mathematics|algebra|geometry|arithmetic|數學/.test(t)) return 'Mathematics';
      if (/english|grammar|comprehension|vocabulary/.test(t))            return 'English';
      if (/chinese|中文|語文|普通話/.test(t))                              return 'Chinese';
      if (/science|biology|chemistry|physics|科學/.test(t))              return 'Science';
      if (/history|歷史/.test(t))                                         return 'History';
      if (/geography|地理/.test(t))                                       return 'Geography';
      return 'General';
    }

    // ── Markdown Worksheet Renderer ──────────────────────────────────────────
    function WorksheetContent({ markdown, subject }) {
      if (!markdown) return null;
      const isMath = subject === 'Mathematics';
      function inlineBold(str) {
        const parts = str.split(/\*\*(.*?)\*\*/g);
        return parts.map((p, i) => i % 2 === 1 ? <strong key={i}>{p}</strong> : p);
      }
      const lines = markdown.split('\n');
      const nodes = [];
      lines.forEach((line, i) => {
        const trimmed = line.trim();
        if (!trimmed) {
          nodes.push(<div key={i} className="h-1" />);
        } else if (trimmed.startsWith('## ')) {
          nodes.push(<h2 key={i} className="text-xl font-bold text-center mt-4 mb-1 font-serif tracking-wide">{trimmed.slice(3)}</h2>);
        } else if (trimmed.startsWith('### ')) {
          nodes.push(<h3 key={i} className="text-base font-bold mt-4 mb-2 font-serif border-b border-gray-400 pb-1">{trimmed.slice(4)}</h3>);
        } else if (trimmed.startsWith('---')) {
          nodes.push(<hr key={i} className="my-3 border-gray-300" />);
        } else if (/^\d+\.\s/.test(trimmed)) {
          nodes.push(
            <div key={i} className="mb-4">
              <p className="font-serif text-sm leading-relaxed">{inlineBold(trimmed)}</p>
              {isMath && <div className="dotted-box mt-2 rounded" style={{border:'1px dotted #aaa',minHeight:'64px',background:'#fafafa',marginBottom:'4px'}} />}
              {!isMath && <div className="mt-2" style={{borderBottom:'1px dotted #bbb',minHeight:'28px'}} />}
            </div>
          );
        } else if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
          const cells = trimmed.split('|').filter(Boolean).map(c => c.trim());
          nodes.push(
            <div key={i} className="flex flex-wrap gap-3 my-3 p-3 bg-blue-50 rounded border border-blue-200">
              {cells.map((cell, ci) => <span key={ci} className="text-sm font-semibold text-blue-800">{cell}</span>)}
            </div>
          );
        } else if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
          nodes.push(<li key={i} className="font-serif text-sm ml-5 list-disc mb-1">{inlineBold(trimmed.slice(2))}</li>);
        } else {
          nodes.push(<p key={i} className="font-serif text-sm leading-relaxed mb-1">{inlineBold(trimmed)}</p>);
        }
      });
      return <div className="text-gray-900">{nodes}</div>;
    }

    // ── Loading Skeleton ─────────────────────────────────────────────────────
    function Skeleton() {
      return (
        <div className="animate-pulse space-y-4 p-6">
          <div className="h-6 bg-gray-200 rounded w-1/2 mx-auto" />
          <div className="h-4 bg-gray-200 rounded w-3/4" />
          <div className="h-4 bg-gray-200 rounded w-full" />
          <div className="h-12 bg-gray-100 rounded border border-dashed border-gray-300" />
          <div className="h-4 bg-gray-200 rounded w-full" />
          <div className="h-4 bg-gray-200 rounded w-5/6" />
          <div className="h-12 bg-gray-100 rounded border border-dashed border-gray-300" />
          <div className="h-4 bg-gray-200 rounded w-full" />
          <div className="h-4 bg-gray-200 rounded w-4/5" />
          <div className="h-12 bg-gray-100 rounded border border-dashed border-gray-300" />
        </div>
      );
    }

    // ── Password Gate ────────────────────────────────────────────────────────
    function PasswordGate({ onUnlock }) {
      const [pw, setPw] = useState('');
      const [err, setErr] = useState(false);
      const submit = () => {
        if (pw === '112233') onUnlock();
        else { setErr(true); setPw(''); }
      };
      return (
        <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center gap-6" style={{fontFamily:'system-ui,sans-serif'}}>
          <div className="flex items-center gap-3 mb-2">
            <div className="bg-blue-600 rounded-xl p-2.5"><Icons.BookOpen className="w-8 h-8 text-white" /></div>
            <div>
              <h1 className="text-2xl font-bold text-gray-900">ExamGo</h1>
              <p className="text-sm text-gray-500">智能練習題生成器</p>
            </div>
          </div>
          <div className="bg-white rounded-2xl shadow-md p-8 flex flex-col items-center gap-4 w-80">
            <Icons.Lock className="w-8 h-8 text-blue-400" />
            <p className="text-sm text-gray-600 font-medium">請輸入密碼以進入</p>
            <input
              type="password"
              value={pw}
              onChange={e => { setPw(e.target.value); setErr(false); }}
              onKeyDown={e => e.key === 'Enter' && submit()}
              placeholder="密碼"
              className={`w-full border rounded-lg px-4 py-2.5 text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-400 ${err ? 'border-red-400 bg-red-50' : 'border-gray-300'}`}
              autoFocus
            />
            {err && <p className="text-xs text-red-500">密碼錯誤，請再試</p>}
            <button onClick={submit} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-2.5 transition-colors">進入</button>
          </div>
        </div>
      );
    }

    // ── Select Component ─────────────────────────────────────────────────────
    function Select({ value, onChange, options, className = '' }) {
      return (
        <div className={`relative inline-block ${className}`}>
          <select
            value={value}
            onChange={e => onChange(e.target.value)}
            className="appearance-none bg-white border border-gray-300 rounded-md pl-3 pr-8 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer"
          >
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
          <Icons.ChevronDown className="absolute right-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400 pointer-events-none" />
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const [unlocked, setUnlocked]     = useState(false);
      const [provider, setProvider]     = useState('claude');
      const [apiKey, setApiKey]         = useState(() => localStorage.getItem('examgo_key') || '');
      const [geminiKey, setGeminiKey]   = useState(() => localStorage.getItem('examgo_gemini_key') || '');
      const [showKey, setShowKey]       = useState(false);
      const [image, setImage]           = useState(null);
      const [output, setOutput]         = useState('');
      const [subject, setSubject]       = useState('');
      const [loading, setLoading]       = useState(false);
      const [error, setError]           = useState('');
      const [isDragging, setIsDragging] = useState(false);
      const [difficulty, setDifficulty] = useState('same');
      const [language, setLanguage]     = useState('chinese');
      const [qCount, setQCount]         = useState('same');
      const fileInputRef = useRef(null);

      if (!unlocked) return <PasswordGate onUnlock={() => setUnlocked(true)} />;

      const saveKey = (k) => { setApiKey(k); k ? localStorage.setItem('examgo_key', k) : localStorage.removeItem('examgo_key'); };
      const saveGeminiKey = (k) => { setGeminiKey(k); k ? localStorage.setItem('examgo_gemini_key', k) : localStorage.removeItem('examgo_gemini_key'); };

      const loadImage = (file) => {
        if (!file || !file.type.startsWith('image/')) { setError('請上傳 JPEG 或 PNG 圖片。'); return; }
        const reader = new FileReader();
        reader.onload = (e) => {
          const dataUrl = e.target.result;
          setImage({ base64: dataUrl.split(',')[1], mediaType: file.type === 'image/png' ? 'image/png' : 'image/jpeg', previewUrl: dataUrl });
          setOutput(''); setError('');
        };
        reader.readAsDataURL(file);
      };
      const onFileChange = (e) => loadImage(e.target.files[0]);
      const onDrop = (e) => { e.preventDefault(); setIsDragging(false); loadImage(e.dataTransfer.files[0]); };
      const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
      const onDragLeave = () => setIsDragging(false);

      const generate = async () => {
        if (!image) { setError('請先上傳功課圖片。'); return; }
        const key = provider === 'claude' ? apiKey.trim() : geminiKey.trim();
        if (!key) { setError('請輸入 API 密鑰。'); return; }
        setLoading(true); setError(''); setOutput('');
        const diffMap  = { easy: 'easier than the original', same: 'the same difficulty', harder: 'harder than the original' };
        const countMap = { same: 'the same number of questions as the original', '+5': '5 more questions than the original', '+10': '10 more questions than the original' };
        const langNote = language === 'chinese' ? 'Generate all questions in Traditional Chinese (繁體中文).' : 'Generate all questions in English.';
        const systemPrompt = `You are a Senior Exam Specialist with 10+ years of experience in Hong Kong schools. You specialize in creating exam-style practice questions.

When given an image of a homework or worksheet:
1. Identify the subject (Math, English, Chinese, Science, etc.)
2. Identify the topic, subtopics, difficulty level and grade level
3. Analyze the question format, structure, and style
4. Generate a NEW worksheet with SIMILAR questions on the same topic.
   - Use different numbers, names, or scenarios
   - Keep the difficulty ${diffMap[difficulty]}
   - Include ${countMap[qCount]}
   - Add a title, subject label, date line, and name line at the top
   - Number all questions clearly
   - For math: include working space below each question
   - For English/Chinese: mirror grammar/comprehension structure
   - For diagrams or tables: describe them in [brackets] as placeholders
5. Format as clean markdown: ## for title, ### for sections, clear numbering.
   Start with a header block: Subject | Topic | Grade Level | Difficulty

${langNote}`;
        try {
          let text = '';
          if (provider === 'claude') {
            const res = await fetch('https://api.anthropic.com/v1/messages', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
              body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 2000, system: systemPrompt, messages: [{ role: 'user', content: [{ type: 'image', source: { type: 'base64', media_type: image.mediaType, data: image.base64 } }, { type: 'text', text: 'Analyze this homework page and generate a similar practice worksheet.' }] }] }),
            });
            if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `API 錯誤 ${res.status}`); }
            const data = await res.json();
            text = data.content?.find(b => b.type === 'text')?.text || '';
          } else {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ system_instruction: { parts: [{ text: systemPrompt }] }, contents: [{ parts: [{ inline_data: { mime_type: image.mediaType, data: image.base64 } }, { text: 'Analyze this homework page and generate a similar practice worksheet.' }] }], generationConfig: { maxOutputTokens: 2000 } }),
            });
            if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `Gemini API 錯誤 ${res.status}`); }
            const data = await res.json();
            text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
          }
          setOutput(text);
          setSubject(detectSubject(text));
        } catch (e) {
          setError(e.message || '生成失敗，請再試。');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col" style={{fontFamily:'system-ui,sans-serif'}}>
          {/* Hidden printable area */}
          <div id="examgo-print" style={{display:'none'}}>
            {output && <WorksheetContent markdown={output} subject={subject} />}
            <p style={{marginTop:'32px',textAlign:'center',fontSize:'10pt',color:'#888'}}>由 ExamGo AI 生成 • examgo.ai</p>
          </div>

          {/* Top Bar */}
          <header className="no-print bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between shadow-sm">
            <div className="flex items-center gap-3">
              <div className="bg-blue-600 rounded-lg p-1.5"><Icons.BookOpen className="w-5 h-5 text-white" /></div>
              <div>
                <h1 className="text-lg font-bold text-gray-900 leading-none">ExamGo</h1>
                <p className="text-xs text-gray-500">智能練習題生成器</p>
              </div>
              {subject && <span className={`ml-3 px-2.5 py-0.5 rounded-full text-xs font-semibold ${subjectColor(subject)}`}>{subject}</span>}
            </div>
            <div className="flex items-center gap-3">
              {/* Provider Toggle */}
              <div className="flex rounded-lg border border-gray-300 overflow-hidden text-xs font-medium">
                <button onClick={() => setProvider('claude')} className={`px-3 py-1.5 transition-colors ${provider === 'claude' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`}>Claude</button>
                <button onClick={() => setProvider('gemini')} className={`px-3 py-1.5 transition-colors ${provider === 'gemini' ? 'bg-blue-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}`}>Gemini</button>
              </div>
              {/* API Key */}
              <Icons.Key className="w-4 h-4 text-gray-400" />
              {provider === 'claude' ? (
                <input type={showKey ? 'text' : 'password'} placeholder="Anthropic API 密鑰" value={apiKey} onChange={e => saveKey(e.target.value)}
                  className="text-xs border border-gray-300 rounded-md px-2 py-1.5 w-52 focus:outline-none focus:ring-2 focus:ring-blue-400" />
              ) : (
                <input type={showKey ? 'text' : 'password'} placeholder="Gemini API 密鑰" value={geminiKey} onChange={e => saveGeminiKey(e.target.value)}
                  className="text-xs border border-gray-300 rounded-md px-2 py-1.5 w-52 focus:outline-none focus:ring-2 focus:ring-blue-400" />
              )}
              <button onClick={() => setShowKey(v => !v)} className="text-xs text-gray-500 hover:text-blue-600 underline">{showKey ? '隱藏' : '顯示'}</button>
            </div>
          </header>

          {/* Main Content */}
          <main className="no-print flex flex-1 overflow-hidden" style={{minHeight:0}}>
            {/* Left Panel — Upload */}
            <div className="w-2/5 flex flex-col border-r border-gray-200 bg-white p-5 gap-4">
              <h2 className="text-sm font-semibold text-gray-700 flex items-center gap-2">
                <Icons.FileImage className="w-4 h-4 text-blue-500" /> 上傳功課圖片
              </h2>
              <div
                className={`flex-shrink-0 border-2 border-dashed rounded-xl flex flex-col items-center justify-center cursor-pointer transition-colors ${isDragging ? 'border-blue-400 bg-blue-50' : 'border-gray-300 hover:border-blue-300 hover:bg-gray-50'}`}
                style={{minHeight:'160px'}}
                onClick={() => fileInputRef.current?.click()}
                onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
              >
                <Icons.Upload className={`w-8 h-8 mb-2 ${isDragging ? 'text-blue-400' : 'text-gray-300'}`} />
                <p className="text-sm text-gray-500">拖放圖片至此或<span className="text-blue-600 font-medium">點擊瀏覽</span></p>
                <p className="text-xs text-gray-400 mt-1">支援 JPEG 及 PNG</p>
                <input ref={fileInputRef} type="file" accept="image/jpeg,image/png" className="hidden" onChange={onFileChange} />
              </div>
              {image && (
                <div className="flex-1 overflow-hidden rounded-lg border border-gray-200 relative">
                  <img src={image.previewUrl} alt="上傳的工作紙" className="w-full h-full object-contain bg-gray-50" style={{maxHeight:'340px'}} />
                  <button onClick={() => { setImage(null); setOutput(''); setSubject(''); setError(''); }}
                    className="absolute top-2 right-2 bg-white rounded-full shadow px-2 py-0.5 text-xs text-gray-600 hover:text-red-500 border border-gray-200">✕ 移除</button>
                </div>
              )}
            </div>
            {/* Right Panel — Output */}
            <div className="flex-1 flex flex-col bg-white p-5 gap-4 overflow-hidden">
              <h2 className="text-sm font-semibold text-gray-700 flex items-center gap-2">
                <Icons.Zap className="w-4 h-4 text-blue-500" /> 生成練習工作紙
              </h2>
              {error && (
                <div className="flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 text-sm">
                  <Icons.AlertCircle className="w-4 h-4 mt-0.5 flex-shrink-0" />
                  <span>{error}</span>
                </div>
              )}
              <div className="flex-1 overflow-y-auto rounded-xl border border-gray-200 shadow-inner bg-white" style={{minHeight:0}}>
                {loading ? <Skeleton /> : output ? (
                  <div className="p-6">
                    <WorksheetContent markdown={output} subject={subject} />
                    <p className="mt-8 text-center text-xs text-gray-400">由 ExamGo AI 生成 • examgo.ai</p>
                  </div>
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-gray-300 gap-3 p-8">
                    <Icons.BookOpen className="w-12 h-12" />
                    <p className="text-sm">上傳圖片後點擊「<strong>生成題目</strong>」</p>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Bottom Bar */}
          <footer className="no-print bg-white border-t border-gray-200 px-6 py-3 flex flex-wrap items-center gap-3">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-xs text-gray-500 font-medium">難度：</span>
              <Select value={difficulty} onChange={setDifficulty} options={[
                { value: 'easy',   label: '較易' },
                { value: 'same',   label: '相同' },
                { value: 'harder', label: '較難' },
              ]} />
              <span className="text-xs text-gray-500 font-medium ml-2">語言：</span>
              <Select value={language} onChange={setLanguage} options={[
                { value: 'english', label: '英文' },
                { value: 'chinese', label: '中文' },
              ]} />
              <span className="text-xs text-gray-500 font-medium ml-2">題數：</span>
              <Select value={qCount} onChange={setQCount} options={[
                { value: 'same', label: '相同數量' },
                { value: '+5',   label: '多5題' },
                { value: '+10',  label: '多10題' },
              ]} />
            </div>
            <div className="flex items-center gap-2 ml-auto">
              {output && (
                <button onClick={generate} disabled={loading}
                  className="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition-colors disabled:opacity-50">
                  <Icons.RefreshCw className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} /> 重新生成
                </button>
              )}
              <button onClick={generate} disabled={loading || !image}
                className="flex items-center gap-2 px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold transition-colors disabled:opacity-50 shadow">
                {loading
                  ? <><Icons.Loader2 className="w-4 h-4 animate-spin" /> 生成中…</>
                  : <><Icons.Zap className="w-4 h-4" /> 生成題目</>}
              </button>
              {output && (
                <button onClick={() => window.print()}
                  className="flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg text-sm font-medium transition-colors">
                  <Icons.Printer className="w-4 h-4" /> 列印
                </button>
              )}
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
