<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamGo – 智能練習題生成器</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563eb'/%3E%3Ctext x='16' y='23' font-family='Georgia,serif' font-size='20' font-weight='bold' fill='white' text-anchor='middle'%3EE%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/heic2any@0.0.4/dist/heic2any.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; }
    html, body, #root { height: 100%; }
    @media print {
      body > *:not(#examgo-print) { display: none !important; }
      #examgo-print {
        display: block !important;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 12pt;
        line-height: 1.6;
        color: #000;
        padding: 0;
        margin: 0;
      }
      .no-print { display: none !important; }
      .dotted-box { border: 1px dotted #aaa; min-height: 48px; margin: 6px 0 16px; }
      @page { margin: 2cm; size: A4; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ── Icons ─────────────────────────────────────────────────────────────────
    const Icons = {
      Upload:      ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>,
      Printer:     ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>,
      RefreshCw:   ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>,
      Loader2:     ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"/><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"/><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"/></svg>,
      AlertCircle: ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      BookOpen:    ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>,
      ChevronDown: ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>,
      Key:         ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>,
      FileImage:   ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><circle cx="10" cy="13" r="2"/><path d="m20 17-1.09-1.09a2 2 0 0 0-2.82 0L10 22"/></svg>,
      Zap:         ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      Lock:        ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
      Clock:       ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Trash2:      ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>,
      X:           ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Brain:       ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.46 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.46 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/></svg>,
      Download:    ({ className }) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    };

    // ── Subject Colors & Detection ───────────────────────────────────────────
    const SUBJECT_COLORS = {
      Mathematics: 'bg-blue-100 text-blue-800',
      English:     'bg-green-100 text-green-800',
      Chinese:     'bg-red-100 text-red-800',
      Science:     'bg-purple-100 text-purple-800',
      History:     'bg-yellow-100 text-yellow-800',
      Geography:   'bg-teal-100 text-teal-800',
      default:     'bg-gray-100 text-gray-700',
    };
    function subjectColor(s) { return SUBJECT_COLORS[s] || SUBJECT_COLORS.default; }
    function detectSubject(text) {
      const t = text.toLowerCase();
      if (/math|mathematics|algebra|geometry|arithmetic|數學/.test(t)) return 'Mathematics';
      if (/english|grammar|comprehension|vocabulary/.test(t))            return 'English';
      if (/chinese|中文|語文|普通話/.test(t))                              return 'Chinese';
      if (/science|biology|chemistry|physics|科學/.test(t))              return 'Science';
      if (/history|歷史/.test(t))                                         return 'History';
      if (/geography|地理/.test(t))                                       return 'Geography';
      return 'General';
    }

    // ── Markdown Worksheet Renderer ──────────────────────────────────────────
    function WorksheetContent({ markdown, subject }) {
      if (!markdown) return null;
      const isMath = subject === 'Mathematics';
      function inlineBold(str) {
        const parts = str.split(/\*\*(.*?)\*\*/g);
        return parts.map((p, i) => i % 2 === 1 ? <strong key={i}>{p}</strong> : p);
      }
      const lines = markdown.split('\n');
      const nodes = [];
      lines.forEach((line, i) => {
        const trimmed = line.trim();
        if (!trimmed) {
          nodes.push(<div key={i} className="h-1" />);
        } else if (trimmed.startsWith('## ')) {
          nodes.push(<h2 key={i} className="text-xl font-bold text-center mt-4 mb-1 font-serif tracking-wide">{trimmed.slice(3)}</h2>);
        } else if (trimmed.startsWith('### ')) {
          nodes.push(<h3 key={i} className="text-base font-bold mt-4 mb-2 font-serif border-b border-gray-400 pb-1">{trimmed.slice(4)}</h3>);
        } else if (trimmed.startsWith('---')) {
          nodes.push(<hr key={i} className="my-3 border-gray-300" />);
        } else if (/^\d+\.\s/.test(trimmed)) {
          nodes.push(
            <div key={i} className="mb-4">
              <p className="font-serif text-sm leading-relaxed">{inlineBold(trimmed)}</p>
              {isMath && <div className="dotted-box mt-2 rounded" style={{border:'1px dotted #aaa',minHeight:'64px',background:'#fafafa',marginBottom:'4px'}} />}
              {!isMath && <div className="mt-2" style={{borderBottom:'1px dotted #bbb',minHeight:'28px'}} />}
            </div>
          );
        } else if (trimmed.startsWith('|') && trimmed.endsWith('|')) {
          const cells = trimmed.split('|').filter(Boolean).map(c => c.trim());
          nodes.push(
            <div key={i} className="flex flex-wrap gap-3 my-3 p-3 bg-blue-50 rounded border border-blue-200">
              {cells.map((cell, ci) => <span key={ci} className="text-sm font-semibold text-blue-800">{cell}</span>)}
            </div>
          );
        } else if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
          nodes.push(<li key={i} className="font-serif text-sm ml-5 list-disc mb-1">{inlineBold(trimmed.slice(2))}</li>);
        } else {
          nodes.push(<p key={i} className="font-serif text-sm leading-relaxed mb-1">{inlineBold(trimmed)}</p>);
        }
      });
      return <div className="text-gray-900">{nodes}</div>;
    }

    // ── Skeleton ─────────────────────────────────────────────────────────────
    function Skeleton() {
      return (
        <div className="animate-pulse space-y-4 p-6">
          <div className="h-6 bg-gray-200 rounded w-1/2 mx-auto" />
          <div className="h-4 bg-gray-200 rounded w-3/4" />
          <div className="h-4 bg-gray-200 rounded w-full" />
          <div className="h-12 bg-gray-100 rounded border border-dashed border-gray-300" />
          <div className="h-4 bg-gray-200 rounded w-full" />
          <div className="h-4 bg-gray-200 rounded w-5/6" />
          <div className="h-12 bg-gray-100 rounded border border-dashed border-gray-300" />
          <div className="h-4 bg-gray-200 rounded w-4/5" />
          <div className="h-12 bg-gray-100 rounded border border-dashed border-gray-300" />
        </div>
      );
    }

    // ── Password Gate ────────────────────────────────────────────────────────
    function PasswordGate({ onUnlock }) {
      const [pw, setPw] = useState('');
      const [err, setErr] = useState(false);
      const submit = () => { if (pw === '112233') onUnlock(); else { setErr(true); setPw(''); } };
      return (
        <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center gap-6 px-4" style={{fontFamily:'system-ui,sans-serif'}}>
          <div className="flex items-center gap-3 mb-2">
            <div className="bg-blue-600 rounded-xl p-2.5"><Icons.BookOpen className="w-8 h-8 text-white" /></div>
            <div><h1 className="text-2xl font-bold text-gray-900">ExamGo</h1><p className="text-sm text-gray-500">智能練習題生成器</p></div>
          </div>
          <div className="bg-white rounded-2xl shadow-md p-8 flex flex-col items-center gap-4 w-full max-w-xs">
            <Icons.Lock className="w-8 h-8 text-blue-400" />
            <p className="text-sm text-gray-600 font-medium">請輸入密碼以進入</p>
            <input type="password" value={pw} onChange={e => { setPw(e.target.value); setErr(false); }} onKeyDown={e => e.key === 'Enter' && submit()}
              placeholder="密碼"
              className={`w-full border rounded-lg px-4 py-3 text-center text-lg tracking-widest focus:outline-none focus:ring-2 focus:ring-blue-400 ${err ? 'border-red-400 bg-red-50' : 'border-gray-300'}`}
              autoFocus />
            {err && <p className="text-xs text-red-500">密碼錯誤，請再試</p>}
            <button onClick={submit} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg py-3 transition-colors text-base">進入</button>
          </div>
        </div>
      );
    }

    // ── History Panel ────────────────────────────────────────────────────────
    function HistoryPanel({ history, onLoad, onDelete, onClear, onClose }) {
      return (
        <div className="fixed inset-0 z-50 flex">
          <div className="flex-1 bg-black bg-opacity-30" onClick={onClose} />
          <div className="w-full md:w-80 bg-white h-full flex flex-col shadow-2xl border-l border-gray-200">
            <div className="flex items-center justify-between px-4 py-3 border-b border-gray-200">
              <span className="font-semibold text-gray-800 flex items-center gap-2"><Icons.Clock className="w-4 h-4 text-blue-500" />歷史記錄</span>
              <div className="flex items-center gap-3">
                {history.length > 0 && <button onClick={onClear} className="text-xs text-red-500 hover:text-red-700 underline">清除全部</button>}
                <button onClick={onClose} className="p-1"><Icons.X className="w-5 h-5 text-gray-400 hover:text-gray-700" /></button>
              </div>
            </div>
            <div className="flex-1 overflow-y-auto">
              {history.length === 0 ? (
                <div className="flex flex-col items-center justify-center h-full text-gray-300 gap-2 p-8">
                  <Icons.Clock className="w-10 h-10" />
                  <p className="text-sm">尚無歷史記錄</p>
                </div>
              ) : history.map(entry => (
                <div key={entry.id} className="border-b border-gray-100 px-4 py-3 hover:bg-gray-50">
                  <div className="flex items-start justify-between gap-2">
                    <button className="text-left flex-1 min-w-0" onClick={() => { onLoad(entry); onClose(); }}>
                      <div className="flex items-center gap-2 mb-1 flex-wrap">
                        <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${entry.mode === 'memo' ? 'bg-purple-100 text-purple-700' : 'bg-blue-100 text-blue-700'}`}>
                          {entry.mode === 'memo' ? '記憶測試' : '練習工作紙'}
                        </span>
                        {entry.subject && <span className={`text-xs px-2 py-0.5 rounded-full font-medium ${subjectColor(entry.subject)}`}>{entry.subject}</span>}
                      </div>
                      <p className="text-xs text-gray-400">{new Date(entry.timestamp).toLocaleString('zh-TW')}</p>
                    </button>
                    <button onClick={() => onDelete(entry.id)} className="p-2 flex-shrink-0">
                      <Icons.Trash2 className="w-4 h-4 text-gray-300 hover:text-red-500" />
                    </button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );
    }

    // ── Select Component ─────────────────────────────────────────────────────
    function Select({ value, onChange, options, className = '' }) {
      return (
        <div className={`relative inline-block ${className}`}>
          <select value={value} onChange={e => onChange(e.target.value)}
            className="appearance-none bg-white border border-gray-300 rounded-md pl-3 pr-8 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer">
            {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
          </select>
          <Icons.ChevronDown className="absolute right-2 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-gray-400 pointer-events-none" />
        </div>
      );
    }

    // ── Main App ─────────────────────────────────────────────────────────────
    function App() {
      const [unlocked, setUnlocked]       = useState(false);
      const [mode, setMode]               = useState('worksheet');
      const [apiKey, setApiKey]           = useState(() => localStorage.getItem('examgo_key') || '');
      const [showKey, setShowKey]         = useState(false);
      const [image, setImage]             = useState(null);
      const [converting, setConverting]   = useState(false);
      const [output, setOutput]           = useState('');
      const [subject, setSubject]         = useState('');
      const [loading, setLoading]         = useState(false);
      const [loadingAnswers, setLoadingAnswers] = useState(false);
      const [error, setError]             = useState('');
      const [toast, setToast]             = useState(null);
      const toastTimer = useRef(null);
      const showToast = (message, type = 'info') => {
        setToast({ message, type });
        clearTimeout(toastTimer.current);
        toastTimer.current = setTimeout(() => setToast(null), 4000);
      };
      const [isDragging, setIsDragging]   = useState(false);
      const [difficulty, setDifficulty]   = useState('same');
      const [language, setLanguage]       = useState('chinese');
      const [qCount, setQCount]           = useState('same');
      const [history, setHistory]         = useState(() => { try { return JSON.parse(localStorage.getItem('examgo_history') || '[]'); } catch { return []; } });
      const [showHistory, setShowHistory] = useState(false);
      const fileInputRef = useRef(null);

      if (!unlocked) return <PasswordGate onUnlock={() => setUnlocked(true)} />;

      const saveKey = (k) => { setApiKey(k); k ? localStorage.setItem('examgo_key', k) : localStorage.removeItem('examgo_key'); };
      const saveHistory = (entries) => { setHistory(entries); localStorage.setItem('examgo_history', JSON.stringify(entries)); };
      const addHistory = (entry) => saveHistory([entry, ...history].slice(0, 50));
      const deleteHistory = (id) => saveHistory(history.filter(e => e.id !== id));
      const clearHistory = () => saveHistory([]);

      const isHeic = (file) => file.type === 'image/heic' || file.type === 'image/heif' ||
        file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif');

      const loadImage = async (file) => {
        if (!file) return;
        if (!file.type.startsWith('image/') && !isHeic(file)) { setError('請上傳 JPEG、PNG 或 HEIC 圖片。'); return; }
        setError('');
        let processedFile = file;
        if (isHeic(file)) {
          setConverting(true);
          try {
            const blob = await heic2any({ blob: file, toType: 'image/jpeg', quality: 0.85 });
            processedFile = new File([blob], file.name.replace(/\.heic$/i, '.jpg'), { type: 'image/jpeg' });
          } catch (e) {
            setConverting(false); setError('HEIC 轉換失敗，請改用 JPEG 或 PNG。'); return;
          }
          setConverting(false);
        }
        const reader = new FileReader();
        reader.onload = (e) => {
          const dataUrl = e.target.result;
          setImage({ base64: dataUrl.split(',')[1], mediaType: processedFile.type === 'image/png' ? 'image/png' : 'image/jpeg', previewUrl: dataUrl });
          setOutput(''); setError('');
        };
        reader.readAsDataURL(processedFile);
      };
      const onFileChange = (e) => loadImage(e.target.files[0]);
      const onDrop = (e) => { e.preventDefault(); setIsDragging(false); loadImage(e.dataTransfer.files[0]); };
      const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
      const onDragLeave = () => setIsDragging(false);

      const callApi = async (sysPrompt, userText) => {
        const key = apiKey.trim();
        if (!key) throw new Error('請輸入 OpenRouter API 密鑰。');
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${key}`,
            'HTTP-Referer': 'https://captaintt2019-code.github.io/examgo/',
            'X-Title': 'ExamGo',
          },
          body: JSON.stringify({
            model: 'meta-llama/llama-3.2-11b-vision-instruct:free',
            max_tokens: 2000,
            messages: [
              { role: 'system', content: sysPrompt },
              { role: 'user', content: [
                { type: 'image_url', image_url: { url: `data:${image.mediaType};base64,${image.base64}` } },
                { type: 'text', text: userText }
              ]}
            ]
          }),
        });
        if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || `OpenRouter API 錯誤 ${res.status}`); }
        const data = await res.json();
        return data.choices[0].message.content || '';
      };

      const generate = async () => {
        if (!image) { setError('請先上傳圖片。'); return; }
        if (!apiKey.trim()) { setError('請輸入 OpenRouter API 密鑰。'); return; }
        setLoading(true); setError(''); setOutput(''); showToast('正在生成，請稍候…', 'info');
        const diffMap  = { easy: 'easier than the original', same: 'the same difficulty', harder: 'harder than the original' };
        const countMap = { same: 'the same number of questions as the original', '+5': '5 more questions than the original', '+10': '10 more questions than the original' };
        const langNote = language === 'chinese' ? 'Generate all content in Traditional Chinese (繁體中文).' : 'Generate all content in English.';
        const sysPrompt = mode === 'worksheet'
          ? `You are a Senior Exam Specialist for Hong Kong schools. Given a homework image, generate a NEW worksheet with SIMILAR questions. Keep difficulty ${diffMap[difficulty]}, include ${countMap[qCount]}. Add title, subject, date and name lines. Number questions. For math include working space. Format: ## title, ### sections. Start with: Subject | Topic | Grade | Difficulty.\n${langNote}`
          : `You are an expert study assistant for Hong Kong students. Given a study page, generate a memorization test with: Section A (填充題): 5-8 fill-in-the-blank sentences; Section B (短答題): 4-6 short-answer questions. Keep difficulty ${diffMap[difficulty]}. Format: ## title, ### sections. Start with: Subject | Topic | Grade | Difficulty.\n${langNote}`;
        const userText = mode === 'memo' ? 'Generate a memorization test from this study page.' : 'Generate a practice worksheet from this homework page.';
        try {
          const text = await callApi(sysPrompt, userText);
          const det = detectSubject(text);
          setOutput(text); setSubject(det);
          addHistory({ id: Date.now(), timestamp: Date.now(), mode, subject: det, output: text });
          showToast('✓ 生成完成！', 'success');
        } catch (e) { setError(e.message || '生成失敗，請再試。'); showToast(e.message || '生成失敗，請再試。', 'error'); }
        finally { setLoading(false); }
      };

      const downloadAnswers = async () => {
        if (!image || !output) return;
        if (!apiKey.trim()) { setError('請輸入 OpenRouter API 密鑰。'); return; }
        setLoadingAnswers(true); setError('');
        const langNote = language === 'chinese' ? 'Write all answers in Traditional Chinese (繁體中文).' : 'Write all answers in English.';
        const sysPrompt = `You are an exam specialist. The user has a worksheet generated from a homework image. Produce a complete answer key. Number each answer to match the question numbers exactly. Be concise and accurate.\n${langNote}`;
        try {
          const text = await callApi(sysPrompt, 'Produce a complete answer key for the worksheet generated from this homework image.');
          const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = 'examgo-answers.txt'; a.click();
          URL.revokeObjectURL(url);
        } catch (e) { setError(e.message || '下載答案失敗，請再試。'); }
        finally { setLoadingAnswers(false); }
      };

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col" style={{fontFamily:'system-ui,sans-serif'}}>
          {/* Printable area */}
          <div id="examgo-print" style={{display:'none'}}>
            {output && <WorksheetContent markdown={output} subject={subject} />}
            <p style={{marginTop:'32px',textAlign:'center',fontSize:'10pt',color:'#888'}}>由 ExamGo AI 生成 • examgo.ai</p>
          </div>

          {/* History drawer */}
          {showHistory && <HistoryPanel history={history}
            onLoad={e => { setOutput(e.output); setSubject(e.subject); setMode(e.mode); }}
            onDelete={deleteHistory} onClear={clearHistory} onClose={() => setShowHistory(false)} />}

          {/* Top Bar */}
          <header className="no-print bg-white border-b border-gray-200 px-4 py-2 shadow-sm">
            <div className="flex items-center justify-between gap-2">
              <div className="flex items-center gap-2">
                <div className="bg-blue-600 rounded-lg p-1.5"><Icons.BookOpen className="w-5 h-5 text-white" /></div>
                <div>
                  <h1 className="text-base font-bold text-gray-900 leading-none">ExamGo</h1>
                  <p className="text-xs text-gray-500 hidden sm:block">智能練習題生成器</p>
                </div>
                {subject && <span className={`px-2 py-0.5 rounded-full text-xs font-semibold hidden sm:inline ${subjectColor(subject)}`}>{subject}</span>}
              </div>
              <div className="flex items-center gap-2">
                <button onClick={() => setShowHistory(true)}
                  className="flex items-center gap-1 px-2.5 py-2 rounded-lg border border-gray-300 text-xs text-gray-600 hover:bg-gray-50 font-medium">
                  <Icons.Clock className="w-4 h-4" />
                  <span className="hidden sm:inline">歷史記錄</span>
                  {history.length > 0 && <span className="bg-blue-100 text-blue-700 rounded-full px-1.5 text-xs font-bold">{history.length}</span>}
                </button>
                <span className="text-xs text-gray-500 bg-gray-100 rounded-md px-2 py-1.5 font-medium">OpenRouter · Llama 3.2 Vision</span>
              </div>
            </div>
            {/* API Key row */}
            <div className="flex items-center gap-2 mt-2">
              <Icons.Key className="w-3.5 h-3.5 text-gray-400 flex-shrink-0" />
              <input type={showKey?'text':'password'} placeholder="OpenRouter API 密鑰" value={apiKey} onChange={e => saveKey(e.target.value)} className="flex-1 text-xs border border-gray-300 rounded-md px-2 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
              <button onClick={() => setShowKey(v => !v)} className="text-xs text-gray-500 hover:text-blue-600 underline whitespace-nowrap">{showKey ? '隱藏' : '顯示'}</button>
            </div>
          </header>

          {/* Mode Tabs */}
          <div className="no-print bg-white border-b border-gray-200 flex">
            <button onClick={() => { setMode('worksheet'); setOutput(''); setError(''); }}
              className={`flex items-center gap-2 px-4 py-2.5 text-sm font-medium border-b-2 transition-colors flex-1 justify-center md:flex-none md:justify-start ${mode==='worksheet' ? 'border-blue-600 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
              <Icons.BookOpen className="w-4 h-4" /> 練習工作紙
            </button>
            <button onClick={() => { setMode('memo'); setOutput(''); setError(''); }}
              className={`flex items-center gap-2 px-4 py-2.5 text-sm font-medium border-b-2 transition-colors flex-1 justify-center md:flex-none md:justify-start ${mode==='memo' ? 'border-purple-600 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700'}`}>
              <Icons.Brain className="w-4 h-4" /> 記憶測試
            </button>
          </div>

          {/* Main Content */}
          <main className="no-print flex flex-col md:flex-row flex-1 overflow-hidden" style={{minHeight:0}}>
            {/* Upload Panel */}
            <div className="w-full md:w-2/5 flex flex-col border-b md:border-b-0 md:border-r border-gray-200 bg-white p-4 gap-3">
              <h2 className="text-sm font-semibold text-gray-700 flex items-center gap-2">
                <Icons.FileImage className="w-4 h-4 text-blue-500" />
                {mode === 'memo' ? '上傳筆記或課本頁面' : '上傳功課圖片'}
              </h2>
              <div
                className={`border-2 border-dashed rounded-xl flex flex-col items-center justify-center cursor-pointer transition-colors ${isDragging ? 'border-blue-400 bg-blue-50' : 'border-gray-300 hover:border-blue-300 hover:bg-gray-50'}`}
                style={{minHeight:'120px'}}
                onClick={() => fileInputRef.current?.click()}
                onDrop={onDrop} onDragOver={onDragOver} onDragLeave={onDragLeave}
              >
                {converting
                  ? <><Icons.Loader2 className="w-7 h-7 mb-1 text-blue-400 animate-spin" /><p className="text-sm text-blue-500">轉換 HEIC 中…</p></>
                  : <><Icons.Upload className={`w-7 h-7 mb-1 ${isDragging ? 'text-blue-400' : 'text-gray-300'}`} />
                    <p className="text-sm text-gray-500">拖放圖片至此或<span className="text-blue-600 font-medium">點擊瀏覽</span></p>
                    <p className="text-xs text-gray-400 mt-0.5">支援 JPEG、PNG、HEIC</p></>
                }
                <input ref={fileInputRef} type="file" accept="image/jpeg,image/png,image/heic,image/heif,.heic,.heif" className="hidden" onChange={onFileChange} />
              </div>
              {image && (
                <div className="relative rounded-lg border border-gray-200 overflow-hidden" style={{maxHeight:'280px'}}>
                  <img src={image.previewUrl} alt="上傳的圖片" className="w-full object-contain bg-gray-50" style={{maxHeight:'280px'}} />
                  <button onClick={() => { setImage(null); setOutput(''); setSubject(''); setError(''); }}
                    className="absolute top-2 right-2 bg-white rounded-full shadow px-2 py-1 text-xs text-gray-600 hover:text-red-500 border border-gray-200">✕ 移除</button>
                </div>
              )}
            </div>

            {/* Output Panel */}
            <div className="flex-1 flex flex-col bg-white p-4 gap-3 overflow-hidden">
              <h2 className="text-sm font-semibold text-gray-700 flex items-center gap-2">
                {mode === 'memo' ? <><Icons.Brain className="w-4 h-4 text-purple-500" />生成記憶測試</> : <><Icons.Zap className="w-4 h-4 text-blue-500" />生成練習工作紙</>}
              </h2>
              {error && (
                <div className="flex items-start gap-2 bg-red-50 border border-red-200 text-red-700 rounded-lg px-3 py-2.5 text-sm">
                  <Icons.AlertCircle className="w-4 h-4 mt-0.5 flex-shrink-0" /><span>{error}</span>
                </div>
              )}
              <div className="flex-1 overflow-y-auto rounded-xl border border-gray-200 shadow-inner bg-white" style={{minHeight:'200px'}}>
                {loading ? <Skeleton /> : output ? (
                  <div className="p-4 md:p-6">
                    <WorksheetContent markdown={output} subject={subject} />
                    <p className="mt-8 text-center text-xs text-gray-400">由 ExamGo AI 生成 • examgo.ai</p>
                  </div>
                ) : (
                  <div className="h-full flex flex-col items-center justify-center text-gray-300 gap-3 p-8">
                    {mode === 'memo' ? <Icons.Brain className="w-10 h-10" /> : <Icons.BookOpen className="w-10 h-10" />}
                    <p className="text-sm text-center text-gray-400">上傳圖片後點擊「{mode === 'memo' ? '生成測試' : '生成題目'}」</p>
                  </div>
                )}
              </div>
            </div>
          </main>

          {/* Bottom Bar */}
          <footer className="no-print bg-white border-t border-gray-200 px-4 py-3 flex flex-col sm:flex-row flex-wrap items-stretch sm:items-center gap-3">
            <div className="flex items-center gap-2 flex-wrap">
              <span className="text-xs text-gray-500 font-medium">難度：</span>
              <Select value={difficulty} onChange={setDifficulty} options={[
                { value: 'easy',   label: '較易' },
                { value: 'same',   label: '相同' },
                { value: 'harder', label: '較難' },
              ]} />
              <span className="text-xs text-gray-500 font-medium ml-1">語言：</span>
              <Select value={language} onChange={setLanguage} options={[
                { value: 'english', label: '英文' },
                { value: 'chinese', label: '中文' },
              ]} />
              {mode === 'worksheet' && <>
                <span className="text-xs text-gray-500 font-medium ml-1">題數：</span>
                <Select value={qCount} onChange={setQCount} options={[
                  { value: 'same', label: '相同數量' },
                  { value: '+5',   label: '多5題' },
                  { value: '+10',  label: '多10題' },
                ]} />
              </>}
            </div>
            <div className="flex items-center gap-2 sm:ml-auto flex-wrap">
              {output && (
                <button onClick={generate} disabled={loading || loadingAnswers}
                  className="flex items-center gap-2 px-3 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg text-sm font-medium transition-colors disabled:opacity-50">
                  <Icons.RefreshCw className={`w-4 h-4 ${loading ? 'animate-spin' : ''}`} /> 重新生成
                </button>
              )}
              <button onClick={generate} disabled={loading || loadingAnswers || !image}
                className={`flex items-center gap-2 px-4 py-2.5 text-white rounded-lg text-sm font-semibold transition-colors disabled:opacity-50 shadow ${mode==='memo' ? 'bg-purple-600 hover:bg-purple-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                {loading
                  ? <><Icons.Loader2 className="w-4 h-4 animate-spin" />生成中…</>
                  : <><Icons.Zap className="w-4 h-4" />{mode === 'memo' ? '生成測試' : '生成題目'}</>}
              </button>
              {output && (
                <button onClick={downloadAnswers} disabled={loading || loadingAnswers || !image}
                  className="flex items-center gap-2 px-3 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-colors disabled:opacity-50">
                  {loadingAnswers
                    ? <><Icons.Loader2 className="w-4 h-4 animate-spin" />下載中…</>
                    : <><Icons.Download className="w-4 h-4" />下載答案</>}
                </button>
              )}
              {output && (
                <button onClick={() => window.print()}
                  className="flex items-center gap-2 px-3 py-2.5 bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 rounded-lg text-sm font-medium transition-colors">
                  <Icons.Printer className="w-4 h-4" />列印
                </button>
              )}
            </div>
          </footer>

          {/* Toast notification */}
          {toast && (
            <div className={`fixed bottom-20 left-1/2 -translate-x-1/2 z-50 flex items-center gap-2 px-4 py-3 rounded-xl shadow-lg text-sm font-medium transition-all ${
              toast.type === 'success' ? 'bg-green-600 text-white' :
              toast.type === 'error'   ? 'bg-red-600 text-white' :
              'bg-gray-800 text-white'
            }`}>
              {toast.type === 'error' && <Icons.AlertCircle className="w-4 h-4 flex-shrink-0" />}
              {toast.message}
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
